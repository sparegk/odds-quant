services:
  - type: web
    name: oddsquant-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: checksPass
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: oddsquant-api
    runtime: docker
    plan: starter
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: sh -c 'exec python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-10000}'
    preDeployCommand: python -m alembic upgrade head
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: ODDSQUANT_DATABASE_URL
        fromDatabase:
          name: oddsquant-db
          property: connectionString
      - key: ODDSQUANT_ENVIRONMENT
        value: production
      - key: ODDSQUANT_SEED_DEMO
        value: "false"
      - key: ODDSQUANT_ADMIN_API_KEY
        generateValue: true
      - key: ODDSQUANT_CORS_ORIGINS
        sync: false
      - key: ODDSQUANT_MATCHDAY_TIMEZONE
        value: Europe/Athens
      - key: ODDSQUANT_MATCHDAY_FORM_MATCHES
        value: "5"

  - type: worker
    name: oddsquant-worker
    runtime: docker
    plan: starter
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: python -m app.jobs.scheduler
    autoDeployTrigger: checksPass
    envVars:
      - key: ODDSQUANT_DATABASE_URL
        fromDatabase:
          name: oddsquant-db
          property: connectionString
      - key: ODDSQUANT_ENVIRONMENT
        value: production
      - key: ODDSQUANT_SEED_DEMO
        value: "false"

databases:
  - name: oddsquant-db
    plan: basic-256mb
    databaseName: oddsquant
    user: oddsquant
